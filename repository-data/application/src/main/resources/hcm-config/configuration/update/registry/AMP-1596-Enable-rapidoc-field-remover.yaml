---
definitions:
  config:
    /hippo:configuration/hippo:update/hippo:registry/AMP-1596-Enable-rapidoc-field-remover:
      hipposys:batchsize: 100
      hipposys:description: ''
      hipposys:dryrun: false
      hipposys:loglevel: DEBUG
      hipposys:logtarget: REPOSITORY
      hipposys:parameters: ''
      hipposys:path: /content/documents/corporate-website/developer/api-catalogue
      hipposys:script: "package org.example.updater\r\n\r\nimport javax.jcr.Node\r\
        \nimport javax.jcr.Session\r\nimport javax.jcr.NodeIterator\r\nimport org.onehippo.repository.update.BaseNodeUpdateVisitor\r\
        \n\r\nclass RemoveEnableRapiDocField extends BaseNodeUpdateVisitor {\r\n\r\
        \n    int totalDocuments = 0\r\n    int removedCount = 0\r\n    String basePath\
        \ = \"/content/documents/corporate-website/developer/api-catalogue\"\r\n\r\
        \n    @Override\r\n    boolean doUpdate(Node node) {\r\n        try {\r\n\
        \            // Process only nodes under the specified base path\r\n     \
        \       if (node.getPath().startsWith(basePath) && node.hasProperty(\"website:enable_rapidoc\"\
        )) {\r\n                totalDocuments++\r\n                node.getProperty(\"\
        website:enable_rapidoc\").remove()\r\n                removedCount++\r\n \
        \               log.info(\"Removed enable_rapidoc from: ${node.path}\")\r\n\
        \            }\r\n        } catch (Exception e) {\r\n            log.error(\"\
        Failed to remove enable_rapidoc from: ${node.path}\", e)\r\n            return\
        \ false\r\n        }\r\n        return true\r\n    }\r\n\r\n    @Override\r\
        \n    void destroy() {\r\n        log.info(\"Total documents found with enable_rapidoc:\
        \ ${totalDocuments}\")\r\n        log.info(\"Successfully removed enable_rapidoc\
        \ from: ${removedCount} documents.\")\r\n        log.info(\"Operation completed.\"\
        )\r\n    }\r\n\r\n    @Override\r\n    boolean undoUpdate(Node node) {\r\n\
        \        return false // No rollback required\r\n    }\r\n}"
      hipposys:throttle: 100
      jcr:primaryType: hipposys:updaterinfo
